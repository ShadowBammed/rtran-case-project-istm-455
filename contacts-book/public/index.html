<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts Book</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #f5f5f5;
      font-weight: 600;
    }
    tr:hover td {
      background: #fafafa;
    }
    #status {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    #error {
      color: #c00;
    }
  </style>
</head>
<body>
  <h1>Contacts Book</h1>
  <p id="status">Loading...</p>
  <table id="contacts-table" hidden>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Address</th>
      </tr>
    </thead>
    <tbody id="contacts-body"></tbody>
  </table>

  <script>
    fetch('/contacts')
      .then(r => {
        if (!r.ok) throw new Error('Request failed: ' + r.status);
        return r.json();
      })
      .then(contacts => {
        const status = document.getElementById('status');
        const table = document.getElementById('contacts-table');
        const tbody = document.getElementById('contacts-body');

        if (contacts.length === 0) {
          status.textContent = 'No contacts found.';
          return;
        }

        contacts.forEach(c => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${esc(c.name)}</td>
            <td>${esc(c.email)}</td>
            <td>${esc(c.phone)}</td>
            <td>${esc(c.address)}</td>
          `;
          tbody.appendChild(tr);
        });

        status.textContent = `${contacts.length} contact${contacts.length !== 1 ? 's' : ''}`;
        table.hidden = false;
      })
      .catch(err => {
        const status = document.getElementById('status');
        status.id = 'error';
        status.textContent = 'Failed to load contacts: ' + err.message;
      });

    function esc(val) {
      if (val == null) return '';
      return String(val)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
